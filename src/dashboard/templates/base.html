<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Stekkies Agent{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.3/dist/htmx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <main class="container">
    <nav class="top">
      <ul><li><strong>Stekkies Agent</strong></li></ul>
      <ul>
        <li><a href="/" class="{{ 'active' if active_page == 'overview' }}">Overview</a></li>
        <li><a href="/funnel" class="{{ 'active' if active_page == 'funnel' }}">Funnel</a></li>
        <li><a href="/self-improvement" class="{{ 'active' if active_page == 'si' }}">Self-improvement</a></li>
        <li><a href="/submissions" class="{{ 'active' if active_page == 'submissions' }}">Submissions</a></li>
        <li><button id="push-toggle" class="outline secondary" hidden
                    style="padding:.2rem .6rem;font-size:.8rem;margin:0;"
                    title="Native notifications on this device for every submission"></button></li>
        <li><button class="outline secondary" onclick="toggleTheme()"
                    style="padding:.2rem .6rem;font-size:.8rem;margin:0;"
                    title="Toggle light/dark">◐</button></li>
      </ul>
    </nav>
    <div id="action-status"></div>
    {% block content %}{% endblock %}
    <footer class="muted-txt" style="margin:2rem 0;font-size:.8rem;">
      Autonomous responder · read-only data from logs · secrets redacted
    </footer>
  </main>
  <script src="/static/dashboard.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
