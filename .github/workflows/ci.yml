name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    # Actions are pinned to full commit SHAs (tag comments alongside): a tag
    # can be re-pointed by a compromised action repo; a SHA cannot.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Install just
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Install pinned agent-browser contract
        run: npm install -g "agent-browser@$(tr -d '[:space:]' < deploy/agent-browser.version)"

      - name: Offline checks (compile + imports + prompt render)
        run: just check
