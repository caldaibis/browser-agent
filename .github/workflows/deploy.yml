name: deploy

# Auto-deploy to the VPS after CI passes on main. Runs the same steps as
# `just deploy`: fast-forward pull, uv sync, ensure self-improvement runtime
# (claude CLI + litellm-proxy.service), restart orchestrator + dashboard
# (+ poller, if it's currently running -- it isn't `systemctl enable`d, so a
# plain `is-enabled` check would silently skip it; see justfile's `deploy`).
on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

# Never let two deploys overlap.
concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Only deploy when the CI run that triggered this actually succeeded.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          REMOTE: /home/deploy/browser-agent
        run: |
          set -euo pipefail
          if [ -z "$SSH_KEY" ] || [ -z "$VPS_HOST" ]; then
            echo "::error::Missing VPS_SSH_KEY or VPS_HOST secret — see deploy/README.md (Auto-deploy)"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_HOST="${VPS_HOST#*@}"
          SSH_TARGET="$VPS_HOST"
          case "$SSH_TARGET" in
            *@*) ;;
            *) SSH_TARGET="root@$SSH_TARGET" ;;
          esac
          if ! ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts; then
            echo "::error::ssh-keyscan could not reach $SSH_HOST — usually a transient network blip between the runner and the VPS; re-run this job"
            exit 1
          fi
          ssh -i ~/.ssh/deploy_key "$SSH_TARGET" "REMOTE='$REMOTE' bash -s" <<'REMOTE_DEPLOY'
            set -euo pipefail
            echo "deploying in $REMOTE on $(hostname)"
            echo "::group::git fast-forward"
            sudo -H -u deploy git -C "$REMOTE" status --short --branch
            sudo -H -u deploy git -C "$REMOTE" fetch origin main
            sudo -H -u deploy git -C "$REMOTE" merge --ff-only origin/main
            sudo -H -u deploy git -C "$REMOTE" log --oneline -1
            echo "::endgroup::"

            echo "::group::dependencies and self-improvement runtime"
            sudo -H -u deploy bash -lc "cd '$REMOTE' && uv sync"
            bash "$REMOTE/deploy/ensure-self-improvement.sh"
            echo "::endgroup::"

            echo "::group::restart services"
            systemctl restart orchestrator dashboard
            if systemctl is-active poller >/dev/null 2>&1; then
              systemctl restart poller
            fi
            systemctl is-active orchestrator dashboard
            if systemctl is-active poller >/dev/null 2>&1; then
              systemctl is-active poller
            fi
            echo "::endgroup::"
            echo deployed
          REMOTE_DEPLOY
